<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login familiare</title>
<style>
* { box-sizing: border-box; }
body {
margin: 0;
font-family: Arial, sans-serif;
background:
radial-gradient(circle at 10% 10%, rgba(191,219,254,0.55), transparent 28%),
radial-gradient(circle at 85% 18%, rgba(249,168,212,0.14), transparent 24%),
linear-gradient(180deg, #fbfcff 0%, #f5f7fb 100%);
color: #1f2937;
}
.container {
max-width: 480px;
margin: 0 auto;
padding: 40px 20px 80px;
}
.card {
background: rgba(255,255,255,0.9);
border: 1px solid rgba(31,41,55,0.08);
border-radius: 24px;
padding: 26px;
box-shadow: 0 20px 60px rgba(31,41,55,0.08);
}
h1 {
margin: 0 0 8px;
font-size: 32px;
letter-spacing: -0.03em;
}
p {
color: #6b7280;
font-size: 14px;
margin-bottom: 18px;
}
label {
display: block;
margin: 12px 0 6px;
font-size: 13px;
font-weight: 700;
}
input {
width: 100%;
padding: 14px;
border-radius: 14px;
border: 1px solid #dbe1ea;
font-size: 14px;
}
button {
width: 100%;
margin-top: 16px;
padding: 14px;
border: none;
border-radius: 14px;
background: linear-gradient(135deg, #111827, #334155);
color: white;
font-weight: 800;
cursor: pointer;
}
.secondary {
background: white;
color: #111827;
border: 1px solid #dbe1ea;
}
.status {
margin-top: 14px;
min-height: 22px;
color: #6b7280;
font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Area familiare</h1>
<p>Accedi per gestire il memoriale, aggiornare la biografia e amministrare i contenuti.</p>

<label for="email">Email</label>
<input id="email" type="email" placeholder="famiglia@email.it" />

<label for="password">Password</label>
<input id="password" type="password" placeholder="Password" />

<button id="btnLogin" type="button">Accedi</button>
<button id="btnSignup" type="button" class="secondary">Crea accesso</button>

<div id="status" class="status"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co";
const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOFO7w_AdzJrVxS";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const statusEl = document.getElementById("status");
const btnLogin = document.getElementById("btnLogin");
const btnSignup = document.getElementById("btnSignup");

btnLogin.addEventListener("click", async () => {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if (!email || !password) {
statusEl.textContent = "Inserisci email e password.";
return;
}

statusEl.textContent = "Accesso in corso...";

const { error } = await client.auth.signInWithPassword({ email, password });

if (error) {
statusEl.textContent = "Errore login: " + error.message;
return;
}

window.location.href = "area-familiare.html";
});

btnSignup.addEventListener("click", async () => {
const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if (!email || !password) {
statusEl.textContent = "Inserisci email e password.";
return;
}

statusEl.textContent = "Creazione accesso in corso...";

const { error } = await client.auth.signUp({ email, password });

if (error) {
statusEl.textContent = "Errore registrazione: " + error.message;
return;
}

statusEl.textContent = "Accesso creato. Ora puoi entrare.";
});
</script>
</body>
</html>
