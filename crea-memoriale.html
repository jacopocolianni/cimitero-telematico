<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crea memoriale</title>

<style>
body {
font-family: Arial, sans-serif;
background: #111;
color: white;
padding: 40px;
}

input, textarea, select {
width: 100%;
padding: 10px;
margin: 10px 0;
background: #222;
color: white;
border: 1px solid #444;
border-radius: 6px;
}

button {
padding: 12px 20px;
background: white;
color: black;
border: none;
border-radius: 6px;
cursor: pointer;
}

.status {
margin-top: 15px;
}
</style>
</head>

<body>

<h1>Crea memoriale</h1>

<input id="nomePersona" placeholder="Nome persona">
<input id="anniVita" placeholder="Anni di vita (es. 1950-2020)">
<textarea id="biografia" placeholder="Biografia"></textarea>

<input id="nomeFamiliare" placeholder="Nome familiare">
<input id="emailFamiliare" placeholder="Email">
<input id="telefonoFamiliare" placeholder="Telefono">

<select id="piano">
<option value="">Seleziona piano</option>
<option value="base">Base</option>
<option value="premium">Premium</option>
</select>

<textarea id="note" placeholder="Note"></textarea>

<button id="btnInviaRichiesta">Invia richiesta</button>

<div id="statusRichiesta" class="status"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co";
const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOF07w_AdzJrvXs";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const btn = document.getElementById("btnInviaRichiesta");
const status = document.getElementById("statusRichiesta");

btn.addEventListener("click", async () => {
status.textContent = "Invio richiesta...";

const nomePersona = document.getElementById("nomePersona").value.trim();
const anniVita = document.getElementById("anniVita").value.trim();
const biografia = document.getElementById("biografia").value.trim();
const nomeFamiliare = document.getElementById("nomeFamiliare").value.trim();
const emailFamiliare = document.getElementById("emailFamiliare").value.trim();
const telefonoFamiliare = document.getElementById("telefonoFamiliare").value.trim();
const piano = document.getElementById("piano").value;
const note = document.getElementById("note").value.trim();

if (!nomePersona || !anniVita || !nomeFamiliare || !emailFamiliare || !piano) {
status.textContent = "Compila tutti i campi obbligatori.";
return;
}

const { error } = await client
.from("richieste")
.insert([
{
nome_persona: nomePersona,
anni: anniVita,
descrizione: biografia,
nome_familiare: nomeFamiliare,
email: emailFamiliare,
telefono: telefonoFamiliare,
piano: piano,
note: note
}
]);

if (error) {
console.error(error);
status.textContent = "Errore: " + error.message;
return;
}

status.textContent = "Richiesta inviata correttamente!";
});
</script>

</body>
</html>
