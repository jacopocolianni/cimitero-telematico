<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Cimitero Telematico</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      color: #ccc;
      max-width: 500px;
    }

    .btn {
      margin-top: 30px;
      padding: 14px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Non solo un nome. Una vita.</h1>
    <p>Ogni persona ha una storia. Ora può essere raccontata, ascoltata e ricordata per sempre.</p>
    <a href="/memoriale.html" class="btn">Scopri un memoriale</a>
  </div>

</body>
</html>
