<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Cimitero Telematico</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      text-align: center;
    }
    .hero {
      padding: 80px 20px;
    }
    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      color: #555;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Non solo un nome. Una vita.</h1>
    <p>Scopri le storie delle persone oltre la pietra.</p>
    <a href="#" class="btn">Scopri un memoriale</a>
  </div>

</body>
</html>
