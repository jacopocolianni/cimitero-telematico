<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>Memoriale</title>

<script src="https://unpkg.com/@supabase/supabase-js"></script>

<style>
body {
margin: 0;
font-family: sans-serif;
background: #0b0b0b;
color: white;
padding: 40px;
}

h1 {
text-align: center;
font-size: 40px;
margin-bottom: 10px;
}

h2 {
margin-top: 40px;
}

.card {
background: #1a1a1a;
padding: 20px;
border-radius: 12px;
margin-top: 20px;
}

input, textarea {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 8px;
border: none;
background: #2a2a2a;
color: white;
}

button {
margin-top: 10px;
width: 100%;
padding: 12px;
border-radius: 8px;
border: none;
background: white;
color: black;
font-weight: bold;
cursor: pointer;
}

.ricordo {
margin-top: 10px;
padding: 10px;
background: #222;
border-radius: 8px;
}
</style>
</head>
<body>

<h1 id="nomePersona">Caricamento...</h1>
<p id="anniPersona" style="text-align:center;"></p>

<div class="card">
<h2>Chi era</h2>
<p id="biografiaPersona">Caricamento biografia...</p>
</div>

<div class="card">
<h2>Lascia un ricordo</h2>

<input id="nomeInput" placeholder="Il tuo nome" />
<textarea id="messaggioInput" placeholder="Scrivi un ricordo..."></textarea>

<button onclick="inviaRicordo()">Invia ricordo</button>
</div>

<div class="card">
<h2>Ricordi condivisi</h2>
<div id="listaRicordi">Caricamento ricordi...</div>
</div>

<script>
const SUPABASE_URL = "https://lbfkrsdtezjowkftntlq.supabase.co";
const SUPABASE_KEY = "sb_publishable_FPogOpV9yRt4EleCtOFO7w_AdzJrVxS";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const nomePersonaEl = document.getElementById("nomePersona");
const anniPersonaEl = document.getElementById("anniPersona");
const biografiaPersonaEl = document.getElementById("biografiaPersona");

const listaRicordiEl = document.getElementById("listaRicordi");

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug") || "mario-rossi";

async function caricaMemoriale() {
const { data, error } = await client
.from("memoriali")
.select("*")
.eq("slug", slug)
.maybeSingle();

if (error) {
nomePersonaEl.textContent = "Errore caricamento";
biografiaPersonaEl.textContent = error.message;
return;
}

if (!data) {
nomePersonaEl.textContent = "Memoriale non trovato";
biografiaPersonaEl.textContent = "Nessun dato disponibile.";
return;
}

nomePersonaEl.textContent = data.nome_persona || "";
anniPersonaEl.textContent = data.anni || "";
biografiaPersonaEl.textContent = data.biografia || "";
}

async function caricaRicordi() {
const { data, error } = await client
.from("ricordi")
.select("*")
.eq("approvato", true)
.eq("memoriale", slug)
.order("id", { ascending: false });

if (error) {
listaRicordiEl.textContent = "Errore caricamento ricordi.";
return;
}

listaRicordiEl.innerHTML = "";

data.forEach(r => {
const div = document.createElement("div");
div.className = "ricordo";
div.innerHTML = `<strong>${r.nome}</strong><br>${r.messaggio}`;
listaRicordiEl.appendChild(div);
});
}

async function inviaRicordo() {
const nome = document.getElementById("nomeInput").value;
const messaggio = document.getElementById("messaggioInput").value;

if (!nome || !messaggio) {
alert("Compila tutti i campi");
return;
}

const { error } = await client.from("ricordi").insert([
{
nome,
messaggio,
memoriale: slug,
approvato: true
}
]);

if (error) {
alert("Errore invio ricordo");
return;
}

document.getElementById("nomeInput").value = "";
document.getElementById("messaggioInput").value = "";

caricaRicordi();
}

caricaMemoriale();
caricaRicordi();
</script>

</body>
</html>
