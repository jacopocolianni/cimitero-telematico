<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoriale</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    .video {
      margin: 30px auto;
      max-width: 700px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    .section {
      margin-top: 40px;
    }

    .box {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      margin: 10px auto 0;
      max-width: 700px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 12px 24px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <h1>Mario Rossi</h1>
  <p>1950 - 2023</p>

  <div class="video">
    <video controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      Il tuo browser non supporta il video.
    </video>
  </div>

  <div class="section">
    <h2>Chi era</h2>
    <div class="box">
      Un uomo gentile, padre amorevole e grande lavoratore.
    </div>
  </div>

  <div class="section">
    <h2>Lascia un ricordo</h2>
    <div class="box">
      <form id="form-ricordo">
        <input id="nome" type="text" placeholder="Il tuo nome" required>
        <textarea id="messaggio" placeholder="Scrivi un ricordo..." required></textarea>
        <button type="submit">Invia ricordo</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co";
    const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOFO7w_AdzJrVxS";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("form-ricordo");
    const statusBox = document.getElementById("status");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const messaggio = document.getElementById("messaggio").value.trim();

      if (!nome || !messaggio) {
        statusBox.textContent = "Compila tutti i campi.";
        return;
      }

      statusBox.textContent = "Invio in corso...";

      const { error } = await client
        .from("ricordi")
        .insert([
          {
            nome: nome,
            messaggio: messaggio,
            approvato: false,
            memoriale: "mario-rossi"
          }
        ]);

      if (error) {
        console.error(error);
        statusBox.textContent = "Errore nel salvataggio.";
      } else {
        statusBox.textContent = "Messaggio inviato con successo.";
        form.reset();
      }
    });
  </script>

</body>
</html>
