<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Memoriale</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 40px;
}

.video {
  margin: 20px auto;
}

.section {
  margin-top: 40px;
}

.box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  margin: auto;
}
</style>
</head>

<body>

<div class="container">
  <h1>Mario Rossi</h1>
  <p>1950 - 2023</p>

  <div class="video">
    <video width="400" controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="section">
    <h2>Chi era</h2>
    <div class="box">
      Un uomo gentile, padre amorevole e grande lavoratore.
    </div>
  </div>

  <div class="section">
    <h2>Lascia un ricordo</h2>
    <div class="box">

      <form onsubmit="event.preventDefault(); salvaMessaggio()">

        <input id="nome" type="text" placeholder="Il tuo nome"
          style="width:80%; padding:12px; margin-bottom:10px;"><br>

        <textarea id="messaggio" placeholder="Scrivi un ricordo..."
          style="width:80%; height:120px; padding:12px;"></textarea><br>

        <button type="submit"
          style="margin-top:15px; padding:12px 24px; background:white; border:none; cursor:pointer;">
          Invia ricordo
        </button>

      </form>

    </div>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co"
const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOFO7w_AdzJrVxS"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

async function salvaMessaggio() {
  const nome = document.getElementById("nome").value
  const messaggio = document.getElementById("messaggio").value

  const { error } = await supabase
    .from('ricordi')
    .insert([
      {
        nome: nome,
        messaggio: messaggio,
        approvato: false,
        memoriale: "mario-rossi"
      }
    ])

  if (error) {
    alert("Errore nel salvataggio")
    console.error(error)
  } else {
    alert("Messaggio inviato!")
    document.getElementById("nome").value = ""
    document.getElementById("messaggio").value = ""
  }
}
</script>

</body>
</html>
