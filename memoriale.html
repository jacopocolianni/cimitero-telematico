<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Memoriale</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  padding: 50px 20px;
}

.box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  margin: auto;
  margin-top: 20px;
}

input, textarea {
  width: 80%;
  padding: 12px;
  margin: 10px 0;
}

button {
  padding: 12px 24px;
  background: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Mario Rossi</h1>
<p>1950 - 2023</p>

<!-- VIDEO FUNZIONANTE ONLINE -->
<video width="400" controls>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<div class="box">
<h2>Chi era</h2>
<p>Un uomo gentile, persona amorevole e grande lavoratore.</p>
</div>

<div class="box">
<h2>Lascia un ricordo</h2>

<input id="nome" placeholder="Il tuo nome">
<textarea id="messaggio" placeholder="Scrivi un ricordo..."></textarea>

<button onclick="invia()">Invia ricordo</button>

</div>

</div>

<script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co"
const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOFO7w_AdzJrVxS"

const client = supabase.createClient(supabaseUrl, supabaseKey)

async function invia() {
  const nome = document.getElementById("nome").value
  const messaggio = document.getElementById("messaggio").value

  if (!nome || !messaggio) {
    alert("Compila tutto")
    return
  }

  const { error } = await client
    .from("ricordi")
    .insert([
      {
        nome: nome,
        messaggio: messaggio,
        approvato: false,
        memoriale: "mario-rossi"
      }
    ])

  if (error) {
    alert("Errore nel salvataggio")
    console.error(error)
  } else {
    alert("Messaggio salvato!")
  }
}
</script>

</body>
</html>
