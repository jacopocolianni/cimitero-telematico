<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memoriale</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, sans-serif;
background: #0d0d0d;
color: white;
line-height: 1.5;
}

.container {
max-width: 900px;
margin: 0 auto;
padding: 40px 20px 80px;
}

.hero {
text-align: center;
padding: 20px 0 10px;
}

h1 {
font-size: 48px;
margin: 0 0 10px;
}

.anni {
color: #bbb;
font-size: 22px;
margin-bottom: 24px;
}

.box {
background: #171717;
border: 1px solid #222;
border-radius: 14px;
padding: 24px;
margin-top: 24px;
}

h2 {
margin: 0 0 14px;
font-size: 28px;
}

p {
color: #ddd;
margin: 0;
}

video {
width: 100%;
border-radius: 12px;
margin-top: 20px;
background: black;
}

input,
textarea,
button {
width: 100%;
padding: 14px;
margin-top: 12px;
border-radius: 10px;
border: 1px solid #333;
background: #101010;
color: white;
font-size: 15px;
}

textarea {
min-height: 120px;
resize: vertical;
}

button {
background: white;
color: black;
border: none;
font-weight: bold;
cursor: pointer;
}

.status {
margin-top: 12px;
color: #bbb;
min-height: 24px;
}

.ricordo {
padding: 14px 0;
border-bottom: 1px solid #2a2a2a;
}

.ricordo:last-child {
border-bottom: none;
}

.ricordo strong {
display: block;
margin-bottom: 6px;
color: white;
}

.vuoto {
color: #888;
}
</style>
</head>
<body>
<div class="container">
<div class="hero">
<h1 id="nomePersona">Caricamento...</h1>
<div class="anni" id="anniPersona"></div>
</div>

<div class="box">
<h2>Chi era</h2>
<p id="biografiaPersona">Caricamento biografia...</p>
<video id="videoPersona" controls style="display:none;"></video>
</div>

<div class="box">
<h2>Lascia un ricordo</h2>
<input id="nome" type="text" placeholder="Il tuo nome" />
<textarea id="messaggio" placeholder="Scrivi un ricordo..."></textarea>
<button id="btnInvia" type="button">Invia ricordo</button>
<div id="status" class="status"></div>
</div>

<div class="box">
<h2>Ricordi condivisi</h2>
<div id="listaRicordi" class="vuoto">Caricamento ricordi...</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://lbfkrsdtezjowkftntlq.supabase.co";
const supabaseKey = "sb_publishable_FPogOpV9yRt4EleCtOF07w_AdzJrvXs";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const nomePersonaEl = document.getElementById("nomePersona");
const anniPersonaEl = document.getElementById("anniPersona");
const biografiaPersonaEl = document.getElementById("biografiaPersona");
const videoPersonaEl = document.getElementById("videoPersona");
const listaRicordiEl = document.getElementById("listaRicordi");
const statusEl = document.getElementById("status");
const btnInvia = document.getElementById("btnInvia");

async function caricaMemoriale() {
const { data, error } = await client
.from("richieste")
.select("*")
.order("creato_il", { ascending: false })
.limit(1)
.maybeSingle();

if (error || !data) {
console.error(error);
nomePersonaEl.textContent = "Memoriale non trovato";
anniPersonaEl.textContent = "";
biografiaPersonaEl.textContent = "Nessun dato disponibile.";
return;
}

nomePersonaEl.textContent = data.nome_persona || "";
anniPersonaEl.textContent = data.anni || "";
biografiaPersonaEl.textContent = data.descrizione || "";

if (data.video_url) {
videoPersonaEl.src = data.video_url;
videoPersonaEl.style.display = "block";
}
}

async function caricaRicordi() {
listaRicordiEl.textContent = "Caricamento ricordi...";

const { data, error } = await client
.from("ricordi")
.select("nome, messaggio, created_at")
.order("created_at", { ascending: false });

if (error) {
console.error(error);
listaRicordiEl.textContent = "Errore nel caricamento dei ricordi.";
return;
}

if (!data || data.length === 0) {
listaRicordiEl.innerHTML = '<div class="vuoto">Nessun ricordo per ora.</div>';
return;
}

listaRicordiEl.innerHTML = "";

data.forEach((r) => {
const div = document.createElement("div");
div.className = "ricordo";
div.innerHTML = `
<strong>${r.nome}</strong>
<div>${r.messaggio}</div>
`;
listaRicordiEl.appendChild(div);
});
}

btnInvia.addEventListener("click", async function () {
const nome = document.getElementById("nome").value.trim();
const messaggio = document.getElementById("messaggio").value.trim();

if (!nome || !messaggio) {
statusEl.textContent = "Compila tutti i campi.";
return;
}

statusEl.textContent = "Invio ricordo...";

const { error } = await client
.from("ricordi")
.insert([
{
nome: nome,
messaggio: messaggio,
approvato: false,
memoriale: "mario-rossi"
}
]);

if (error) {
console.error(error);
statusEl.textContent = "Errore: " + error.message;
return;
}

statusEl.textContent = "Ricordo inviato correttamente. Sarà visibile dopo approvazione.";
document.getElementById("nome").value = "";
document.getElementById("messaggio").value = "";
});

caricaMemoriale();
caricaRicordi();
</script>
</body>
</html>
